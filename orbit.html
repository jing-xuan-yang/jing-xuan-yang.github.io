<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行星轨道模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  overflow: hidden;
}
canvas { display: block; cursor: grab; }
canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── Retina / HiDPI ───
const W = 1000, H = 700;
const dpr = devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

// ─────────────────────────────────────────────
// PHYSICS ENGINE
// ─────────────────────────────────────────────
const G = 1.0, SOFTENING = 4.0, RADIUS_SCALE = 1.6, MIN_RADIUS = 3;
const BODY_TYPES = {
  star:   { name:'恒星',  mass:8000, color:[255,200,60] },
  planet: { name:'行星',  mass:60,   color:[90,150,255] },
  comet:  { name:'彗星',  mass:8,    color:[180,230,255] },
  probe:  { name:'探测器',mass:1,    color:[220,220,220] },
};

class Body {
  constructor(x,y,vx,vy,mass,type,color) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.mass=mass; this.bodyType=type;
    this.color=color; this.alive=true;
  }
  get radius() { return Math.max(MIN_RADIUS, Math.cbrt(this.mass)*RADIUS_SCALE); }
  get collisionRadius() { return this.bodyType==='star'?this.radius/3:0; }
}

class World {
  constructor() { this.bodies=[]; this.collisions=[]; }
  add(b) { this.bodies.push(b); }
  clear() { this.bodies=[]; this.collisions=[]; }
  step(dt) {
    let arr = this.bodies.filter(b=>b.alive), n=arr.length;
    let ax=new Float64Array(n), ay=new Float64Array(n);
    for(let i=0;i<n;i++) for(let j=i+1;j<n;j++) {
      let a=arr[i], b=arr[j];
      let dx=b.x-a.x, dy=b.y-a.y;
      let d2=dx*dx+dy*dy+SOFTENING*SOFTENING, d=Math.sqrt(d2);
      let inv=G/(d2*d);
      ax[i]+=inv*b.mass*dx; ay[i]+=inv*b.mass*dy;
      ax[j]-=inv*a.mass*dx; ay[j]-=inv*a.mass*dy;
    }
    for(let i=0;i<n;i++) {
      let b=arr[i];
      b.vx+=ax[i]*dt; b.vy+=ay[i]*dt;
      b.x+=b.vx*dt;   b.y+=b.vy*dt;
    }
    this._handleCollisions(arr);
  }
  _handleCollisions(arr) {
    for(let i=0;i<arr.length;i++) {
      let a=arr[i]; if(!a.alive) continue;
      for(let j=i+1;j<arr.length;j++) {
        let b=arr[j]; if(!b.alive) continue;
        let dx=b.x-a.x, dy=b.y-a.y;
        if(Math.sqrt(dx*dx+dy*dy)<a.collisionRadius+b.collisionRadius) this._merge(a,b);
      }
    }
  }
  _merge(a,b) {
    let big=a.mass>=b.mass?a:b, small=a.mass>=b.mass?b:a;
    let total=a.mass+b.mass;
    let vx=(a.mass*a.vx+b.mass*b.vx)/total, vy=(a.mass*a.vy+b.mass*b.vy)/total;
    let x=(a.mass*a.x+b.mass*b.x)/total, y=(a.mass*a.y+b.mass*b.y)/total;
    let rel=Math.hypot(a.vx-b.vx,a.vy-b.vy), strength=small.mass+rel*2;
    big.mass=total; big.x=x; big.y=y; big.vx=vx; big.vy=vy; big.alive=true;
    small.alive=false;
    this.collisions.push({x,y,strength});
    this.bodies=this.bodies.filter(b=>b.alive);
  }
}

function circularSpeed(centerMass,r) { return Math.sqrt(G*centerMass/r); }

function makeSolarSystem() {
  let w=new World();
  let sunM=BODY_TYPES.star.mass;
  w.add(new Body(0,0,0,0,sunM,'star',BODY_TYPES.star.color));
  let planets=[
    [120,50,[120,200,120]],[200,70,[90,150,255]],
    [290,90,[230,150,90]],[380,120,[200,120,230]],
  ];
  for(let [r,m,c] of planets) { let v=circularSpeed(sunM,r); w.add(new Body(r,0,0,v,m,'planet',c)); }
  let rc=330, vc=circularSpeed(sunM,rc)*0.55;
  w.add(new Body(0,-rc,vc,0,BODY_TYPES.comet.mass,'comet',BODY_TYPES.comet.color));
  return w;
}

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
const PANEL_W=150, VP=0.08, SUB=2, DT=0.5, TRAIL_LEN=600;

const cam={scale:1, cx:(W+PANEL_W)/2, cy:H/2, ox:0, oy:0};
function w2s(x,y){return [cam.cx+(x-cam.ox)*cam.scale, cam.cy+(y-cam.oy)*cam.scale];}
function s2w(sx,sy){return [(sx-cam.cx)/cam.scale+cam.ox, (sy-cam.cy)/cam.scale+cam.oy];}
function zoomAt(sx,sy,f){
  let [wx,wy]=s2w(sx,sy); cam.scale*=f;
  cam.scale=Math.max(0.005,Math.min(240,cam.scale));
  cam.ox=wx-(sx-cam.cx)/cam.scale; cam.oy=wy-(sy-cam.cy)/cam.scale;
}

let world=makeSolarSystem(), explosions=[], trails={};
let paused=false, placingPhase=null, pending=null, velDragging=false, panning=false;
let mouse=[0,0], panStart=[0,0], timeScale=1;

// ─── Selection / Follow ───
let selectedBody=null, following=false, followBtnRect=null, followOffset={x:0,y:0};

// ─── Orbit preview ───
let previewPath=null, previewCollision=null;
const PREVIEW_STEPS_BASE=3000, PREVIEW_DT=0.3;
function previewSteps(){return Math.round(Math.min(30000,PREVIEW_STEPS_BASE/Math.max(0.01,cam.scale)));}

// ─── Buttons ───
const types=['star','planet','comet','probe'];
let buttons=types.map((t,i)=>({type:t, rect:[15,70+i*70,PANEL_W-30,55]}));
function resetBtnRect(){return [15,H-60,PANEL_W-30,40];}

// ─── Explosion ───
class Explosion {
  constructor(x,y,strength){this.x=x;this.y=y;this.t=0;this.life=30;this.maxR=8+strength*0.6;}
  update(){return ++this.t<this.life;}
  draw(){
    let p=this.t/this.life, [sx,sy]=w2s(this.x,this.y), r=this.maxR*p*cam.scale;
    if(r<1) return;
    let alpha=Math.max(0,255*(1-p))|0;
    ctx.save(); ctx.globalAlpha=alpha/255;
    ctx.strokeStyle=`rgb(${255},${200-120*p|0},${60})`;
    ctx.lineWidth=3; ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────
// ORBIT PREVIEW
// ─────────────────────────────────────────────
function computeOrbitPreview() {
  if(!pending||placingPhase!=='vel'){previewPath=null;previewCollision=null;return;}
  let copy=b=>new Body(b.x,b.y,b.vx,b.vy,b.mass,b.bodyType,[...b.color]);
  let bodies=world.bodies.filter(b=>b.alive).map(copy);
  let pb=new Body(pending.x,pending.y,pending.vx,pending.vy,pending.mass,pending.bodyType,[...pending.color]);
  bodies.push(pb);
  let path=[], collision=null;
  let steps=previewSteps();
  for(let step=0;step<steps;step++){
    let n=bodies.length, ax=new Float64Array(n), ay=new Float64Array(n);
    for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
      let a=bodies[i], br=bodies[j];
      let dx=br.x-a.x, dy=br.y-a.y;
      let d2=dx*dx+dy*dy+SOFTENING*SOFTENING, d=Math.sqrt(d2);
      let inv=G/(d2*d);
      ax[i]+=inv*br.mass*dx; ay[i]+=inv*br.mass*dy;
      ax[j]-=inv*a.mass*dx; ay[j]-=inv*a.mass*dy;
    }
    for(let i=0;i<n;i++){let b=bodies[i];b.vx+=ax[i]*PREVIEW_DT;b.vy+=ay[i]*PREVIEW_DT;b.x+=b.vx*PREVIEW_DT;b.y+=b.vy*PREVIEW_DT;}
    path.push({x:pb.x,y:pb.y});
    // collision check
    for(let i=0;i<bodies.length-1;i++){
      let b=bodies[i];
      let dx=pb.x-b.x, dy=pb.y-b.y;
      if(Math.sqrt(dx*dx+dy*dy)<pb.collisionRadius+b.collisionRadius){collision={x:pb.x,y:pb.y};break;}
    }
    if(collision) break;
    let escapeDist=Math.max(6000,3000/cam.scale);
    if(Math.hypot(pb.x,pb.y)>escapeDist) break;
  }
  previewPath=path; previewCollision=collision;
}

function drawOrbitPreview() {
  if(!previewPath||previewPath.length<2) return;
  let pts=previewPath.map(p=>w2s(p.x,p.y));
  let hasCollision=previewCollision!==null;
  ctx.save();
  ctx.setLineDash([6,6]);
  ctx.strokeStyle=hasCollision?'rgb(255,40,40)':'rgba(120,200,255,0.5)';
  ctx.lineWidth=hasCollision?2:1.5;
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
  ctx.setLineDash([]);
  if(hasCollision){
    let [cx,cy]=w2s(previewCollision.x,previewCollision.y);
    let cr=Math.max(4,6*cam.scale);
    ctx.strokeStyle='rgb(255,60,60)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx,cy,cr*1.6,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────
function drawTrails() {
  for(let b of world.bodies) {
    let trail=trails[b.id];
    if(!trail||trail.length<2) continue;
    let pts=trail.map(p=>w2s(p[0],p[1]));
    let c=b.color.map(v=>Math.max(0,v*.5|0));
    ctx.strokeStyle=`rgb(${c[0]},${c[1]},${c[2]})`;
    ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.stroke();
  }
}

function drawGlow(sx,sy,r,color) {
  ctx.save();
  for(let i=4;i>0;i--) {
    let a=30*i/4|0, rr=r*i/4;
    ctx.globalAlpha=a/255; ctx.fillStyle=`rgb(${color[0]},${color[1]},${color[2]})`;
    ctx.beginPath(); ctx.arc(sx,sy,rr,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawBodies() {
  for(let b of world.bodies) {
    let [sx,sy]=w2s(b.x,b.y), r=Math.max(2,b.radius*cam.scale);
    if(b.bodyType==='star') drawGlow(sx,sy,r*2.2,b.color);
    ctx.fillStyle=`rgb(${b.color[0]},${b.color[1]},${b.color[2]})`;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
  }
}

function drawArrowHead(sx,sy,ex,ey,color){
  let ang=Math.atan2(ey-sy,ex-sx), sz=8;
  ctx.strokeStyle=color; ctx.lineWidth=2;
  for(let da of[150,-150]){
    let a=ang+da*Math.PI/180, x=ex+sz*Math.cos(a), y=ey+sz*Math.sin(a);
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(x,y); ctx.stroke();
  }
}

function drawPending() {
  if(!pending) return;
  let b=pending, [sx,sy]=w2s(b.x,b.y), r=Math.max(2,b.radius*cam.scale);
  ctx.save(); ctx.globalAlpha=0.6;
  ctx.fillStyle=`rgb(${b.color[0]},${b.color[1]},${b.color[2]})`;
  ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(placingPhase==='vel') {
    let ex=sx+b.vx*cam.scale/VP, ey=sy+b.vy*cam.scale/VP;
    ctx.strokeStyle='rgb(80,200,120)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
    drawArrowHead(sx,sy,ex,ey,'rgb(80,200,120)');
  }
  let speed=Math.hypot(b.vx,b.vy);
  let angle=Math.atan2(-b.vy,b.vx)*180/Math.PI;
  ctx.fillStyle='#fff'; ctx.font='13px sans-serif'; ctx.textAlign='left';
  let lines=[`质量: ${b.mass.toFixed(1)}`,`速度: ${speed.toFixed(1)}`,`角度: ${angle.toFixed(0)}\u00b0`];
  lines.forEach((t,i)=>{ ctx.fillText(t,sx+r+6,sy-8+i*16); });
}

function drawPanel() {
  ctx.fillStyle='rgb(24,28,48)'; ctx.fillRect(0,0,PANEL_W,H);
  ctx.fillStyle='#fff'; ctx.font='bold 18px sans-serif'; ctx.textAlign='left';
  ctx.fillText('天体',15,30);
  for(let{type:t,rect:r}of buttons){
    let info=BODY_TYPES[t];
    ctx.fillStyle='rgb(45,50,75)'; roundRect(ctx,r[0],r[1],r[2],r[3],8);
    if(pending&&pending.bodyType===t){ctx.save();ctx.strokeStyle='rgb(120,200,120)';ctx.lineWidth=2;ctx.beginPath();roundRect(ctx,r[0],r[1],r[2],r[3],8);ctx.stroke();ctx.restore();}
    let cy=r[1]+r[3]/2;
    ctx.fillStyle=`rgb(${info.color[0]},${info.color[1]},${info.color[2]})`;
    ctx.beginPath(); ctx.arc(r[0]+22,cy,12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgb(230,230,230)'; ctx.font='14px sans-serif'; ctx.textAlign='left';
    ctx.fillText(info.name,r[0]+42,cy+5);
  }
  let rb=resetBtnRect();
  // speed controls (above reset)
  let sbY=rb[1]-56, sbW=(PANEL_W-30-10)/3, sbH=28, sbGap=5;
  ctx.fillStyle='rgb(55,60,90)';
  roundRect(ctx,15,sbY,sbW,sbH,6);
  roundRect(ctx,15+sbW+sbGap,sbY,sbW,sbH,6);
  roundRect(ctx,15+sbW*2+sbGap*2,sbY,sbW,sbH,6);
  ctx.fillStyle='#aac'; ctx.font='15px sans-serif'; ctx.textAlign='center';
  ctx.fillText('-',15+sbW/2,sbY+sbH/2+5);
  ctx.fillText(`${timeScale.toFixed(1)}x`,15+sbW+sbGap+sbW/2,sbY+sbH/2+5);
  ctx.fillText('+',15+sbW*2+sbGap*2+sbW/2,sbY+sbH/2+5);
  // reset button
  ctx.fillStyle='rgb(120,50,60)'; roundRect(ctx,rb[0],rb[1],rb[2],rb[3],8);
  ctx.fillStyle='#fff'; ctx.font='14px sans-serif'; ctx.textAlign='center';
  ctx.fillText('重来 (R)',rb[0]+rb[2]/2,rb[1]+rb[3]/2+5);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
}

function drawHUD() {
  let status;
  if(placingPhase==='pos') status='放置中：移动到舞台并松开鼠标';
  else if(placingPhase==='vel') status='拉出箭头设定速度，松开确认（\u2191\u2193改质量）';
  else if(paused) status='已暂停（空格继续）';
  else status='模拟中（空格暂停）';
  ctx.fillStyle='rgb(255,230,120)'; ctx.font='18px sans-serif'; ctx.textAlign='left';
  ctx.fillText(status,PANEL_W+20,25);
  ctx.fillStyle='rgb(150,160,190)'; ctx.font='14px sans-serif';
  ctx.fillText('滚轮缩放 \u00b7 左/右键拖动平移 \u00b7 从左侧拖出天体 \u00b7 点击天体选择',PANEL_W+20,48);
  ctx.textAlign='right'; ctx.fillText(`天体数: ${world.bodies.length}`,W-15,25);
}

// ─── Hover / Selection / Follow ───
let hoveredBody=null;

function drawHover(){
  if(!hoveredBody||placingPhase) return;
  let[sx,sy]=w2s(hoveredBody.x,hoveredBody.y);
  let r=Math.max(2,hoveredBody.radius*cam.scale)+6;
  ctx.save(); ctx.globalAlpha=0.35;
  ctx.strokeStyle='rgba(180,220,255,0.6)'; ctx.lineWidth=1.5;
  ctx.setLineDash([3,5]);
  ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawSelection() {
  if(!selectedBody||!selectedBody.alive){selectedBody=null;following=false;followBtnRect=null;return;}
  let [sx,sy]=w2s(selectedBody.x,selectedBody.y);
  let r=Math.max(2,selectedBody.radius*cam.scale)+8;
  ctx.save();
  let phase=performance.now()/600;
  ctx.strokeStyle='rgba(0,200,255,0.5)'; ctx.lineWidth=1.5;
  ctx.setLineDash([4,6]); ctx.lineDashOffset=-phase*20;
  ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  // show follow/unfollow button only when mouse hovering this body
  let showBtn=(!following&&selectedBody)||(following&&hoveredBody===selectedBody);
  if(showBtn){
    let bw=80,bh=26,bx=sx-bw/2,by=sy+r+12;
    followBtnRect=[bx,by,bw,bh];
    ctx.save();
    ctx.fillStyle='rgba(30,35,60,0.85)';
    ctx.beginPath(); roundRect(ctx,bx,by,bw,bh,6); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(following?'\u25c9 取消跟随':'\u25cb 跟随',bx+bw/2,by+bh/2);
    ctx.restore();
  }else{
    followBtnRect=null;
  }
}

function draw() {
  ctx.fillStyle='rgb(8,10,24)'; ctx.fillRect(0,0,W,H);
  drawTrails();
  if(placingPhase==='vel') drawOrbitPreview();
  drawBodies(); drawHover();
  for(let e of explosions) e.draw();
  drawPending(); drawPanel(); drawHUD(); drawSelection();
}

// ─── Physics update ───
function updatePhysics() {
  let effectiveDT=DT*timeScale;
  let sub=effectiveDT/SUB;
  for(let i=0;i<SUB;i++) world.step(sub);
  for(let c of world.collisions) explosions.push(new Explosion(c.x,c.y,c.strength));
  world.collisions=[];
}

// ids
let _nextId=1;
function assignIds(){for(let b of world.bodies){if(!b.id)b.id=_nextId++;}if(pending&&!pending.id)pending.id=_nextId++;}
assignIds();

function updateTrails() {
  let alive=new Set();
  for(let b of world.bodies){let id=b.id;alive.add(id);if(!trails[id])trails[id]=[];let tr=trails[id];tr.push([b.x,b.y]);if(tr.length>TRAIL_LEN)tr.shift();}
  for(let id in trails){if(!alive.has(Number(id)))delete trails[id];}
}

// ─── Input ───
function getCanvasPos(e){
  let rect=canvas.getBoundingClientRect();
  return[(e.clientX-rect.left)*(W/rect.width),(e.clientY-rect.top)*(H/rect.height)];
}

function getBodyAt(sx,sy){
  let best=null,bestDist=Infinity;
  for(let b of world.bodies){
    let[bsx,bsy]=w2s(b.x,b.y), r=Math.max(2,b.radius*cam.scale)+8;
    let d=Math.hypot(sx-bsx,sy-bsy);
    if(d<r&&d<bestDist){bestDist=d;best=b;}
  }
  return best;
}

canvas.addEventListener('mousedown',e=>{
  let[sx,sy]=getCanvasPos(e);
  if(e.button===0) onLeftDown(sx,sy);
  if(e.button===2){panning=true;panStart=[sx,sy];e.preventDefault();}
});
canvas.addEventListener('mousemove',e=>{
  let[sx,sy]=getCanvasPos(e);
  mouse=[sx,sy]; onMouseMove(sx,sy);
});
canvas.addEventListener('mouseup',e=>{
  let[sx,sy]=getCanvasPos(e);
  if(e.button===0) onLeftUp(sx,sy);
  if(e.button===2) panning=false;
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault(); let[sx,sy]=getCanvasPos(e);
  zoomAt(sx,sy,e.deltaY<0?1.1:1/1.1);
},{passive:false});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();paused=!paused;}
  if(e.key==='r'||e.key==='R') reset();
  if(e.key==='Escape') cancelPlacing();
  if((e.key==='ArrowUp'||e.key==='ArrowDown')&&pending){
    e.preventDefault();
    pending.mass*=e.key==='ArrowUp'?1.3:1/1.3;
    if(pending.mass<0.2)pending.mass=0.2;
  }
});

function onLeftDown(sx,sy){
  if(placingPhase===null){
    // check follow/unfollow button
    if(followBtnRect&&sx>=followBtnRect[0]&&sx<=followBtnRect[0]+followBtnRect[2]&&sy>=followBtnRect[1]&&sy<=followBtnRect[1]+followBtnRect[3]){
      if(following){following=false;}
      else{followOffset.x=cam.ox-selectedBody.x;followOffset.y=cam.oy-selectedBody.y;following=true;}
      return;
    }
    // check panel buttons
    for(let{type:t,rect:r}of buttons){
      if(sx>=r[0]&&sx<=r[0]+r[2]&&sy>=r[1]&&sy<=r[1]+r[3]){startPlacing(t,sx,sy);return;}
    }
    // reset button
    let rb=resetBtnRect();
    if(sx>=rb[0]&&sx<=rb[0]+rb[2]&&sy>=rb[1]&&sy<=rb[1]+rb[3]){reset();return;}
    // speed buttons
    let sbY=rb[1]-56, sbW=(PANEL_W-30-10)/3, sbH=28, sbGap=5;
    if(sy>=sbY&&sy<=sbY+sbH){
      if(sx>=15&&sx<=15+sbW){
        let step=timeScale>10?2:0.5;
        timeScale=Math.max(0.5,timeScale-step);
        return;
      }
      if(sx>=15+sbW+sbGap&&sx<=15+sbW*2+sbGap){timeScale=1;return;}
      if(sx>=15+sbW*2+sbGap*2&&sx<=15+sbW*3+sbGap*2){
        let step=timeScale>=10?2:0.5;
        timeScale=Math.min(98,timeScale+step);
        return;
      }
    }
    // check body selection (only if not on panel)
    if(sx>=PANEL_W){
      let hit=getBodyAt(sx,sy);
      if(hit){
        selectedBody=hit;following=false;followBtnRect=null;
        return;
      }
      // start pan
      panning=true; panStart=[sx,sy];
    }
    return;
  }
  if(placingPhase==='vel'){velDragging=true;updatePendingVelocity(sx,sy);}
}

function onMouseMove(sx,sy){
  if(placingPhase==='pos'&&pending){let[wx,wy]=s2w(sx,sy);pending.x=wx;pending.y=wy;}
  if(placingPhase==='vel'&&velDragging) updatePendingVelocity(sx,sy);
  if(placingPhase==='vel') computeOrbitPreview();
  // hover detection
  if(placingPhase===null&&sx>=PANEL_W) hoveredBody=getBodyAt(sx,sy);
  else hoveredBody=null;
  if(panning){
    let dx=(sx-panStart[0])/cam.scale, dy=(sy-panStart[1])/cam.scale;
    if(following&&selectedBody&&selectedBody.alive){followOffset.x-=dx;followOffset.y-=dy;}
    else{cam.ox-=dx;cam.oy-=dy;}
    panStart=[sx,sy];
  }
}

function onLeftUp(sx,sy){
  if(panning){panning=false;return;}
  if(placingPhase==='pos'){if(sx<PANEL_W)cancelPlacing();else placingPhase='vel';return;}
  if(placingPhase==='vel'&&velDragging){
    updatePendingVelocity(sx,sy);
    if(!pending.id)pending.id=_nextId++;
    world.add(pending);
    finishPlacing();
    previewPath=null; previewCollision=null;
  }
}

function startPlacing(type,sx,sy){
  let info=BODY_TYPES[type]; let[wx,wy]=s2w(sx,sy);
  pending=new Body(wx,wy,0,0,info.mass,type,info.color);
  if(!pending.id)pending.id=_nextId++;
  placingPhase='pos'; velDragging=false;
}

function updatePendingVelocity(sx,sy){
  if(!pending) return;
  let[bsx,bsy]=w2s(pending.x,pending.y);
  pending.vx=(sx-bsx)*VP/cam.scale;
  pending.vy=(sy-bsy)*VP/cam.scale;
}

function finishPlacing(){pending=null;placingPhase=null;velDragging=false;}
function cancelPlacing(){pending=null;placingPhase=null;velDragging=false;previewPath=null;previewCollision=null;}

function clearSelection(){selectedBody=null;following=false;followBtnRect=null;}

function reset(){
  world=makeSolarSystem(); explosions=[]; trails={}; cancelPlacing(); paused=false; clearSelection();
  for(let b of world.bodies){if(!b.id)b.id=_nextId++;}
}

// ─── Game Loop ───
let last=0;
function loop(t){
  assignIds();
  // follow: camera tracks body with user-offset (draggable)
  if(following&&selectedBody&&selectedBody.alive){
    cam.ox=selectedBody.x+followOffset.x;
    cam.oy=selectedBody.y+followOffset.y;
    // keep body on screen even after drag
    let[sx,sy]=w2s(selectedBody.x,selectedBody.y);
    if(sx<10) followOffset.x-=(10-sx)/cam.scale;
    else if(sx>W-10) followOffset.x+=(sx-(W-10))/cam.scale;
    if(sy<10) followOffset.y-=(10-sy)/cam.scale;
    else if(sy>H-10) followOffset.y+=(sy-(H-10))/cam.scale;
  }else if(following&&(!selectedBody||!selectedBody.alive)){following=false;selectedBody=null;followBtnRect=null;}
  if(!paused&&placingPhase===null) updatePhysics();
  updateTrails();
  explosions=explosions.filter(e=>e.update());
  draw();
  requestAnimationFrame(loop);
}

// init
for(let b of world.bodies){b.id=_nextId++;}
requestAnimationFrame(loop);
</script>
