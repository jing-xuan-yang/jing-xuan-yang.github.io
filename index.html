<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杨景轩的网站导航</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  min-height: 100vh;
  transition: background 0.35s, color 0.35s, border-color 0.35s;
}
body { --panel-bg: rgba(16,16,32,0.96); --panel-border: rgba(255,255,255,0.12); }
body::before {
  content: ''; position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  transition: opacity 0.35s;
}
.container { max-width: 960px; margin: 0 auto; padding: 30px 20px 60px; position: relative; z-index: 1; }

/* ─── Header ─── */
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.header h1 { font-size: 1.6rem; font-weight: 800; white-space: nowrap; cursor: default; }

/* ─── Settings Button ─── */
.settings-btn {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid;
  cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center;
  transition: 0.2s; flex-shrink: 0; background: transparent;
}
.settings-btn:hover { transform: scale(1.1); }

/* ─── Search ─── */
.search-wrap { flex: 1; min-width: 160px; position: relative; }
.search-wrap input {
  width: 100%; padding: 9px 14px 9px 36px; border-radius: 10px;
  font-size: 0.9rem; outline: none; transition: 0.2s;
  background: var(--bg2); border: 1px solid var(--border); color: inherit;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text2); }
.search-wrap .s-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 0.9rem; pointer-events: none; opacity: 0.4; }
.search-results {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 12px; max-height: 300px; overflow-y: auto;
  display: none; z-index: 100; background: var(--panel-bg); border: 1px solid var(--panel-border);
}
.search-results.show { display: block; }
.search-results .item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  cursor: pointer; transition: 0.12s; border-bottom: 1px solid var(--border);
  color: inherit;
}
.search-results .item:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
.search-results .item .sn em { color: var(--accent); }
.search-results .item:last-child { border-bottom: none; }
.search-results .item .si { font-size: 1.1rem; }
.search-results .item .info { flex: 1; }
.search-results .item .sn { font-size: 0.9rem; }
.search-results .item .sn em { font-style: normal; font-weight: 600; }
.search-results .item .sp { font-size: 0.75rem; margin-top: 2px; opacity: 0.6; }

/* ─── Breadcrumb ─── */
.breadcrumb {
  display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
  padding: 10px 14px; border-radius: 10px; margin-bottom: 24px; font-size: 0.88rem;
  border: 1px solid var(--border); transition: 0.35s; background: var(--bg2);
}
.breadcrumb .sep { margin: 0 4px; font-size: 0.75rem; opacity: 0.4; color: var(--text2); }
.breadcrumb .item {
  padding: 2px 6px; border-radius: 6px; cursor: pointer; transition: 0.12s;
  text-decoration: none; opacity: 0.6; color: var(--text2);
}
.breadcrumb .item:hover { opacity: 1; color: var(--text); background: color-mix(in srgb, var(--accent) 8%, transparent); }
.breadcrumb .item.active { opacity: 1; cursor: default; font-weight: 600; color: var(--accent); }
.breadcrumb .back {
  display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
  border-radius: 6px; cursor: pointer; margin-right: 4px; font-size: 0.88rem;
  border: 1px solid var(--border); transition: 0.15s; opacity: 0.5; background: transparent;
  color: var(--text2);
}
.breadcrumb .back:hover { opacity: 1; color: var(--text); border-color: var(--accent); }

/* ─── Grid ─── */
.cht {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  font-size: 0.82rem; color: var(--text2);
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
}
.card {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: 26px 14px 20px; border-radius: 14px; border: 1px solid var(--border);
  cursor: pointer; transition: all 0.25s; text-decoration: none;
  position: relative; overflow: hidden;
  background: var(--bg2); color: inherit;
}
.card::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  background: radial-gradient(500px circle at var(--mx,50%) var(--my,50%), var(--accent) 0%, transparent 50%);
  opacity: 0.04;
}
.card:hover { transform: translateY(-3px); border-color: var(--accent); }
.card:hover::before { opacity: 0.07; }
.card:active { transform: scale(0.97); }
.card .ci { font-size: 2rem; margin-bottom: 10px; position: relative; z-index: 1; }
.card .cn {
  font-size: 0.92rem; font-weight: 600; margin-bottom: 4px;
  position: relative; z-index: 1; word-break: break-all;
}
.card .cd {
  font-size: 0.76rem; line-height: 1.4; position: relative; z-index: 1;
  color: var(--text2);
}
.card .ct {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 0.68rem; margin-top: 8px; position: relative; z-index: 1;
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  color: var(--accent);
}

/* ─── Settings Panel ─── */
.settings-overlay {
  position: fixed; inset: 0; z-index: 9999; display: none;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
}
.settings-overlay.open { display: flex; }
.settings-panel {
  width: 420px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
  padding: 28px; border-radius: 18px; animation: spIn 0.25s;
  background: var(--panel-bg); border: 1px solid var(--panel-border); color: inherit;
}
@keyframes spIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.settings-panel h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
.settings-panel .sp-sub { font-size: 0.82rem; margin-bottom: 20px; opacity: 0.5; }
.sp-section { margin-bottom: 22px; }
.sp-section:last-child { margin-bottom: 0; }
.sp-section-title {
  font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  opacity: 0.4; margin-bottom: 10px;
}
.theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.theme-card {
  padding: 14px; border-radius: 12px; border: 2px solid; cursor: pointer;
  transition: 0.15s; text-align: center; font-size: 0.85rem; font-weight: 600;
  background: var(--bg2); border-color: var(--border); color: inherit;
}
.theme-card:hover { transform: scale(1.03); border-color: var(--accent); }
.theme-card.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
.theme-card .tc-preview {
  display: flex; gap: 4px; justify-content: center; margin-bottom: 8px;
}
.theme-card .tc-preview span {
  width: 20px; height: 20px; border-radius: 5px; border: 1px solid rgba(0,0,0,0.08);
}
.theme-card .tc-name { font-size: 0.78rem; }
.settings-close {
  margin-top: 18px; width: 100%; padding: 10px;
  border-radius: 10px; border: 1px solid; cursor: pointer;
  font-size: 0.9rem; font-weight: 600; transition: 0.15s;
  background: transparent; border-color: var(--border); color: inherit;
}
.settings-close:hover { opacity: 0.7; background: var(--bg2); }

/* ─── Empty ─── */
.empty { text-align: center; padding: 60px 20px; grid-column: 1 / -1; color: var(--text2); }
.empty .ei { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

@media (max-width: 600px) {
  .container { padding: 16px 12px 40px; }
  .header h1 { font-size: 1.3rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .card { padding: 20px 10px 16px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 id="title">📁 导航</h1>
    <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
    <div class="search-wrap">
      <span class="s-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="cht">
    <span></span>
    <span id="count"></span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel" id="settingsPanel">
    <h2>⚙️ 设置</h2>
    <p class="sp-sub">自定义导航外观</p>
    <div class="sp-section">
      <div class="sp-section-title">🎨 主题</div>
      <div class="theme-grid" id="themeGrid"></div>
    </div>
    <button class="settings-close" id="settingsClose">关闭</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// THEMES
// ══════════════════════════════════════════════
const THEMES = [
  { id: 'deep-space', name: '深空', bg: '#0c0c18', bg2: 'rgba(255,255,255,0.04)', text: '#e8e8f0', text2: 'rgba(255,255,255,0.45)', border: 'rgba(255,255,255,0.08)', accent: '#818cf8', accent2: '#a78bfa', cardHl: 'rgba(99,102,241,0.08)', gradient: 'radial-gradient(ellipse 600px 400px at 10% 20%, rgba(99,102,241,0.10), transparent), radial-gradient(ellipse 500px 500px at 90% 80%, rgba(139,92,246,0.08), transparent)', preview: ['#0c0c18','#818cf8','#e8e8f0'] },
  { id: 'light', name: '亮色', bg: '#f5f5fa', bg2: '#ffffff', text: '#1a1a2e', text2: 'rgba(0,0,0,0.45)', border: 'rgba(0,0,0,0.1)', accent: '#6366f1', accent2: '#8b5cf6', cardHl: 'rgba(99,102,241,0.06)', gradient: 'radial-gradient(ellipse 600px 400px at 10% 20%, rgba(99,102,241,0.04), transparent)', preview: ['#f5f5fa','#6366f1','#1a1a2e'] },
  { id: 'aurora', name: '极光', bg: '#0a1628', bg2: 'rgba(255,255,255,0.04)', text: '#dce8f0', text2: 'rgba(220,232,240,0.45)', border: 'rgba(100,200,255,0.12)', accent: '#38bdf8', accent2: '#2dd4bf', cardHl: 'rgba(56,189,248,0.08)', gradient: 'radial-gradient(ellipse 600px 400px at 10% 20%, rgba(56,189,248,0.10), transparent), radial-gradient(ellipse 500px 500px at 90% 80%, rgba(45,212,191,0.06), transparent)', preview: ['#0a1628','#38bdf8','#dce8f0'] },
  { id: 'warm', name: '暖阳', bg: '#1a1210', bg2: 'rgba(255,255,255,0.04)', text: '#f0e6dc', text2: 'rgba(240,230,220,0.45)', border: 'rgba(255,180,100,0.12)', accent: '#f59e0b', accent2: '#f97316', cardHl: 'rgba(245,158,11,0.08)', gradient: 'radial-gradient(ellipse 600px 400px at 10% 20%, rgba(245,158,11,0.08), transparent), radial-gradient(ellipse 500px 500px at 90% 80%, rgba(249,115,22,0.06), transparent)', preview: ['#1a1210','#f59e0b','#f0e6dc'] },
  { id: 'forest', name: '森林', bg: '#0c1a12', bg2: 'rgba(255,255,255,0.04)', text: '#d8f0dc', text2: 'rgba(216,240,220,0.45)', border: 'rgba(100,200,120,0.12)', accent: '#34d399', accent2: '#10b981', cardHl: 'rgba(52,211,153,0.08)', gradient: 'radial-gradient(ellipse 600px 400px at 10% 20%, rgba(52,211,153,0.08), transparent), radial-gradient(ellipse 500px 500px at 90% 80%, rgba(16,185,129,0.06), transparent)', preview: ['#0c1a12','#34d399','#d8f0dc'] },
  { id: 'ocean', name: '海洋', bg: '#0c1424', bg2: 'rgba(255,255,255,0.04)', text: '#dce6f4', text2: 'rgba(220,230,244,0.45)', border: 'rgba(100,150,255,0.12)', accent: '#60a5fa', accent2: '#3b82f6', cardHl: 'rgba(96,165,250,0.08)', gradient: 'radial-gradient(ellipse 600px 400px at 10% 20%, rgba(96,165,250,0.08), transparent), radial-gradient(ellipse 500px 500px at 90% 80%, rgba(59,130,246,0.06), transparent)', preview: ['#0c1424','#60a5fa','#dce6f4'] }
];

// ══════════════════════════════════════════════
// FILES
// ══════════════════════════════════════════════
const FILES = [
  {
    name: 'tools', icon: '📂', desc: '工具',
    children: [
      { name: 'mbti.html', icon: '🧠', title: 'MBTI 性格测试', desc: '心理测评', url: 'tools/mbti.html' },
      { name: '反应力测试.html', icon: '⚡', title: '反应力测试', desc: '反应速度', url: 'tools/反应力测试.html' },
      { name: '手速测试.html', icon: '🖱', title: '手速测试', desc: '点击速度', url: 'tools/手速测试.html' },
      {
        name: '软件推荐', icon: '💿', desc: '软件推荐',
        children: [
          {
            name: '电脑', icon: '💻', desc: '电脑软件',
            children: [
              { name: '7z.html', icon: '🗜', title: '7-Zip', desc: '压缩工具', url: 'tools/软件推荐/电脑/7z.html' },
              { name: 'chrome.html', icon: '🌐', title: 'Chrome', desc: '浏览器', url: 'tools/软件推荐/电脑/chrome.html' },
              { name: 'geek.html', icon: '🧹', title: 'Geek Uninstaller', desc: '卸载工具', url: 'tools/软件推荐/电脑/geek.html' },
              { name: 'offic 2024.html', icon: '📊', title: 'Office 2024', desc: '办公软件', url: 'tools/软件推荐/电脑/offic 2024.html' }
            ]
          }
        ]
      }
    ]
  },
  {
    name: 'games', icon: '🎮', desc: '游戏',
    children: [
      { name: 'orbit.html', icon: '🪐', title: '行星轨道模拟器', desc: '物理模拟', url: 'games/orbit.html' },
      { name: '求解器.html', icon: '📐', title: '方程组求解器', desc: '数学工具', url: 'games/求解器.html' },
      { name: '五子棋.html', icon: '⚫', title: '五子棋', desc: '棋类', url: 'games/五子棋.html' },
      { name: '数独 (2) (2)~~~~~ (1).html', icon: '🔢', title: '数独', desc: '益智', url: 'games/数独 (2) (2)~~~~~ (1).html' },
      { name: '羊了个羊1 (1) (1).html', icon: '🐑', title: '羊了个羊', desc: '休闲', url: 'games/羊了个羊1 (1) (1).html' }
    ]
  }
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentPath = [];
let searchActive = false;

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
function applyTheme(id) {
  const t = THEMES.find(x => x.id === id) || THEMES[0];
  const root = document.body.style;
  root.background = t.bg;
  root.color = t.text;
  document.body.style.setProperty('--bg2', t.bg2);
  document.body.style.setProperty('--text2', t.text2);
  document.body.style.setProperty('--border', t.border);
  document.body.style.setProperty('--accent', t.accent);
  document.body.style.setProperty('--accent2', t.accent2);
  document.body.style.setProperty('--card-hl', t.cardHl);
  document.body.style.setProperty('--gradient', t.gradient);
  document.title = '杨景轩的网站导航';

  // Panel colors
  const isLight = t.id === 'light';
  document.body.style.setProperty('--panel-bg', isLight ? 'rgba(245,245,250,0.97)' : 'rgba(16,16,32,0.96)');
  document.body.style.setProperty('--panel-border', isLight ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.12)');

  // Gradient title
  document.getElementById('title').style.background = `linear-gradient(135deg, ${t.accent}, ${t.accent2})`;
  document.getElementById('title').style.webkitBackgroundClip = 'text';
  document.getElementById('title').style.webkitTextFillColor = 'transparent';
  document.getElementById('title').style.backgroundClip = 'text';

  // Settings button colors
  const sBtn = document.getElementById('settingsBtn');
  sBtn.style.color = t.accent;
  sBtn.style.borderColor = t.border;

  localStorage.setItem('nav-theme', id);
  updateActiveTheme(id);
}

function updateActiveTheme(id) {
  document.querySelectorAll('.theme-card').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

function renderThemes() {
  const g = document.getElementById('themeGrid');
  g.innerHTML = THEMES.map(t => `
    <div class="theme-card" data-id="${t.id}" onclick="applyTheme('${t.id}')">
      <div class="tc-preview">${t.preview.map(c => `<span style="background:${c}"></span>`).join('')}</div>
      <div class="tc-name">${t.name}</div>
    </div>
  `).join('');
  const saved = localStorage.getItem('nav-theme') || 'deep-space';
  updateActiveTheme(saved);
}

// ══════════════════════════════════════════════
// FILE NAV
// ══════════════════════════════════════════════
function getNode(path) {
  let node = { children: FILES };
  for (let idx of path) node = node.children[idx];
  return node;
}

function getParent(path) {
  return path.length === 0 ? null : path.slice(0, -1);
}

function isFolder(node) {
  return node && node.children !== undefined;
}

function displayName(item) {
  return item.title || item.name;
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  const parent = getParent(currentPath);
  let items = [{ name: '首页', path: [] }];
  let cur = FILES;
  for (let i = 0; i < currentPath.length; i++) {
    items.push({ name: cur[currentPath[i]].name, path: currentPath.slice(0, i + 1) });
    cur = cur[currentPath[i]].children;
  }
  let html = `<span class="back" onclick="currentPath=[];render()" style="${parent===null?'opacity:0.2;pointer-events:none':''}">← 返回</span>`;
  items.forEach((item, i) => {
    if (i > 0) html += `<span class="sep">›</span>`;
    html += i === items.length - 1
      ? `<span class="item active">${item.name}</span>`
      : `<span class="item" onclick="currentPath=[${item.path.join(',')}];render()">${item.name}</span>`;
  });
  el.innerHTML = html;
}

function render() {
  if (searchActive) return;
  const node = getNode(currentPath);
  renderBreadcrumb();

  const grid = document.getElementById('grid');
  if (!node || !node.children || node.children.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="ei">📭</div><div>空</div></div>';
    document.getElementById('count').textContent = '';
    return;
  }
  const children = node.children;
  document.getElementById('count').textContent = `${children.length} 项`;

  grid.innerHTML = children.map((item, idx) => {
    const childPath = [...currentPath, idx];
    const isFld = isFolder(item);
    const dn = displayName(item);
    const mouseTrack = `onmousemove="this.style.setProperty('--mx',(event.offsetX)+'px');this.style.setProperty('--my',(event.offsetY)+'px')"`;
    if (isFld) {
      return `<div class="card" ${mouseTrack} onclick="currentPath=[${childPath.join(',')}];render()" style="cursor:pointer">
        <div class="ci">${item.icon || '📁'}</div>
        <div class="cn">${dn}</div>
        <div class="cd">${item.desc || ''}</div>
      </div>`;
    }
    return `<a class="card" ${mouseTrack} href="${item.url || item.name}" target="_blank">
      <div class="ci">${item.icon || '📄'}</div>
      <div class="cn">${dn}</div>
      <div class="cd">${item.desc || ''}</div>
      ${item.tag ? `<span class="ct">${item.tag}</span>` : ''}
    </a>`;
  }).join('');
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
function flatten(node, path, results) {
  if (!node.children) return;
  for (let i = 0; i < node.children.length; i++) {
    const c = node.children[i];
    const p = [...path, c.name];
    results.push({ ...c, dn: displayName(c), fp: p, ip: [...path, i] });
    if (c.children) flatten(c, p, results);
  }
}

function doSearch(q) {
  const el = document.getElementById('searchResults');
  if (!q.trim()) { el.classList.remove('show'); searchActive = false; render(); return; }
  searchActive = true;
  const query = q.toLowerCase();
  const all = []; flatten({ children: FILES }, [], all);
  const matches = all.filter(item => (item.dn + ' ' + item.name).toLowerCase().includes(query));

  el.innerHTML = matches.length === 0
    ? '<div class="item" style="justify-content:center;opacity:0.5;cursor:default">无</div>'
    : matches.slice(0, 20).map(item => {
        const idx = item.dn.toLowerCase().indexOf(query);
        const name = idx === -1 ? item.dn : item.dn.slice(0, idx) + '<em>' + item.dn.slice(idx, idx + query.length) + '</em>' + item.dn.slice(idx + query.length);
        const click = item.children
          ? `onclick="currentPath=[${item.ip.join(',')}];document.getElementById('searchInput').value='';document.getElementById('searchResults').classList.remove('show');searchActive=false;render()"`
          : `onclick="window.open('${item.url || item.name}','_blank')"`;
        return `<div class="item" ${click}>
          <span class="si">${item.icon || (item.children ? '📁' : '📄')}</span>
          <div class="info">
            <div class="sn">${name}</div>
            <div class="sp">首页 / ${item.fp.join(' / ')}</div>
          </div>
        </div>`;
      }).join('');
  el.classList.add('show');
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
// Theme
renderThemes();
const savedTheme = localStorage.getItem('nav-theme') || 'deep-space';
applyTheme(savedTheme);

document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsOverlay').classList.add('open');
document.getElementById('settingsClose').onclick = () => document.getElementById('settingsOverlay').classList.remove('open');
document.getElementById('settingsOverlay').onclick = e => { if (e.target === e.currentTarget) document.getElementById('settingsOverlay').classList.remove('open'); };

// Search
document.getElementById('searchInput').addEventListener('input', function() { doSearch(this.value); });
document.getElementById('searchInput').addEventListener('blur', function() { setTimeout(() => { document.getElementById('searchResults').classList.remove('show'); if (!this.value.trim()) { searchActive = false; render(); } }, 200); });
document.getElementById('searchInput').addEventListener('focus', function() { if (this.value.trim()) doSearch(this.value); });

// Render nav
render();
</script>
</body>
</html>
