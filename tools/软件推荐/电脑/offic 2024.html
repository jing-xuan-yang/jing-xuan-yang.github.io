<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载 Office 2024</title>
    <style>
        /* 设置页面基础样式，让内容垂直水平居中 */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center; /* 水平居中 */
            align-items: center;     /* 垂直居中 */
            background-color: #f4f4f9; /* 柔和的背景色 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 按钮容器，用于垂直排列按钮和描述 */
        .button-container {
            text-align: center;
        }

        /* 通用按钮样式 */
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background-color: #007BFF; /* 蓝色背景 */
            border: none;
            border-radius: 8px;
            text-decoration: none; /* 去掉下划线 */
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px; /* 按钮和下方文字的间距 */
        }

        /* 鼠标悬停效果 */
        .download-btn:hover {
            background-color: #0056b3;
        }

        /* 点击效果 */
        .download-btn:active {
            transform: scale(0.98);
        }

        /* 描述文字样式 */
        .description {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        .password {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <!-- 下载按钮 -->
        <a href="https://jingxuanyang.lanzouq.com/b01d71q1sj" class="download-btn">下载 Office 2024</a>

        <!-- 描述和密码提示 -->
        <div class="description">
            <p>密码: <span class="password">djeg</span></p>
            <p>解压提示：请把三个文件的 <code>.e</code> 后缀清除，再用分卷解压打开。</p>
        </div>
    </div>

</body>
</html>
