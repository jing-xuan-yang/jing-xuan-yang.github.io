<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  min-height: 100vh;
  background: #0f0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%, rgba(14, 165, 233, 0.06) 0%, transparent 40%);
  pointer-events: none;
}

/* floating orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  pointer-events: none;
  animation: orbFloat 20s ease-in-out infinite;
}
.orb:nth-child(1) {
  width: 400px; height: 400px;
  background: #6366f1;
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.orb:nth-child(2) {
  width: 350px; height: 350px;
  background: #8b5cf6;
  bottom: -80px; right: -80px;
  animation-delay: -7s;
}
.orb:nth-child(3) {
  width: 250px; height: 250px;
  background: #0ea5e9;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -14s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.1); }
  66% { transform: translate(-20px, 20px) scale(0.9); }
}

.container {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 2.6rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle {
  color: rgba(255,255,255,0.45);
  font-size: 1rem;
  margin-bottom: 50px;
  letter-spacing: 0.3px;
}

.cards {
  display: flex;
  gap: 30px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  width: 280px;
  padding: 40px 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.35s;
  pointer-events: none;
}

.card:nth-child(1)::before { background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 50%), rgba(99,102,241,0.12), transparent 40%); }
.card:nth-child(2)::before { background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 50%), rgba(139,92,246,0.12), transparent 40%); }

.card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: rgba(255,255,255,0.2);
}

.card:hover::before { opacity: 1; }

.card:active {
  transform: translateY(-2px) scale(0.98);
}

.card-icon {
  width: 64px; height: 64px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 28px;
  position: relative;
  z-index: 1;
}

.card:nth-child(1) .card-icon {
  background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(99,102,241,0.05));
  color: #818cf8;
}

.card:nth-child(2) .card-icon {
  background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(139,92,246,0.05));
  color: #a78bfa;
}

.card h2 {
  font-size: 1.35rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.card p {
  color: rgba(255,255,255,0.45);
  font-size: 0.9rem;
  line-height: 1.6;
  position: relative;
  z-index: 1;
}

.card-tag {
  display: inline-block;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  margin-top: 16px;
  position: relative;
  z-index: 1;
}

.card:nth-child(1) .card-tag {
  background: rgba(99,102,241,0.15);
  color: #818cf8;
}

.card:nth-child(2) .card-tag {
  background: rgba(139,92,246,0.15);
  color: #a78bfa;
}

/* glow effect on hover */
.card::after {
  content: '';
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
  top: var(--my, 50%);
  left: var(--mx, 50%);
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.card:hover::after { opacity: 1; }

.footer {
  margin-top: 50px;
  color: rgba(255,255,255,0.2);
  font-size: 0.8rem;
  letter-spacing: 0.5px;
}

@media (max-width: 640px) {
  h1 { font-size: 2rem; }
  .cards { gap: 20px; }
  .card { width: 260px; padding: 30px 24px; }
}
</style>
</head>
<body>

<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>

<div class="container">
  <h1>探索空间</h1>
  <p class="subtitle">选择你想体验的项目</p>

  <div class="cards">
    <a class="card" href="orbit.html" target="_blank"
       onmousemove="this.style.setProperty('--mx', (event.offsetX)+'px');this.style.setProperty('--my', (event.offsetY)+'px')">
      <div class="card-icon">🪐</div>
      <h2>行星轨道模拟器</h2>
      <p>实时引力物理引擎，拖拽创建天体，模拟行星轨道运动与碰撞</p>
      <span class="card-tag">物理 · 交互</span>
    </a>

    <a class="card" href="mbti.html" target="_blank"
       onmousemove="this.style.setProperty('--mx', (event.offsetX)+'px');this.style.setProperty('--my', (event.offsetY)+'px')">
      <div class="card-icon">🧠</div>
      <h2>MBTI 性格测试</h2>
      <p>48题快速筛查与93题经典标准版，深入探索你的内在人格类型</p>
      <span class="card-tag">心理 · 测评</span>
    </a>
  </div>

  <div class="footer">jing-xuan-yang.github.io</div>
</div>

</body>
</html>
